name: Match Reminders Cron
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel Cron API
        run: |
          curl -X GET "https://mm-ennustus.vercel.app/api/cron/reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
